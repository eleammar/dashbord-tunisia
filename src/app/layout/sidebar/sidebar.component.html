<aside
  class="relative flex flex-col h-full flex-shrink-0
         bg-[#0d1526] border-r border-white/[0.06]
         transition-all duration-300 ease-in-out z-30"
  [style.width]="collapsed ? '64px' : '240px'">

  <!-- ═══════════════════════════════════════════════
       LOGO
  ═══════════════════════════════════════════════ -->
  <div class="flex items-center gap-3 px-4
              border-b border-white/[0.06]"
       style="height:60px; min-height:60px">

    <!-- Logo mark -->
    <div class="flex-shrink-0 w-8 h-8 rounded-lg
                bg-blue-600 flex items-center justify-center
                shadow-lg shadow-blue-900/50">
      <svg class="w-4 h-4 text-white" fill="none"
           stroke="currentColor" viewBox="0 0 24 24"
           stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2
                 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0
                 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0
                 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064
                 M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>

    <!-- Brand -->
    <div *ngIf="!collapsed"
         class="overflow-hidden animate-fade-in">
      <p class="text-sm font-bold text-white
                font-display tracking-tight leading-none">
        Explorer Tunisia
      </p>
      <p class="text-[11px] text-slate-500 mt-1 leading-none">
        Admin Console
      </p>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════
       NAVIGATION
  ═══════════════════════════════════════════════ -->
  <nav class="flex-1 overflow-y-auto overflow-x-hidden py-4"
       style="scrollbar-width:none">

    <div *ngFor="let group of navGroups; let first = first"
         [class.mt-5]="!first">

      <!-- Group Label -->
      <div *ngIf="!collapsed"
           class="px-4 mb-1.5">
        <span class="text-[10px] font-semibold uppercase
                     tracking-[0.1em] text-slate-600">
          {{ group.label }}
        </span>
      </div>
      <div *ngIf="collapsed && !first"
           class="mx-3 mb-3 border-t border-white/[0.06]">
      </div>

      <!-- Items -->
      <ul class="space-y-0.5 px-2">
        <li *ngFor="let item of group.items">

          <a [routerLink]="item.path"
             routerLinkActive="is-active"
             [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
             [title]="collapsed ? item.label : ''"
             class="nav-item group relative flex items-center gap-3
                    px-3 py-2.5 rounded-lg cursor-pointer
                    transition-all duration-150
                    text-slate-400 hover:text-white hover:bg-white/[0.06]">

            <!-- Active BG -->
            <span class="absolute inset-0 rounded-lg
                         bg-blue-600/20 opacity-0
                         nav-active-bg transition-opacity duration-150">
            </span>

            <!-- Active left border -->
            <span class="absolute left-0 top-2 bottom-2 w-0.5
                         bg-blue-500 rounded-full opacity-0
                         nav-active-line transition-opacity duration-150">
            </span>

            <!-- Icon -->
            <svg class="w-[18px] h-[18px] flex-shrink-0 relative z-10
                        transition-colors duration-150"
                 fill="none" stroke="currentColor"
                 viewBox="0 0 24 24" stroke-width="1.75">
              <ng-container *ngIf="isArray(item.svgPath)">
                <path *ngFor="let p of $any(item.svgPath)"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      [attr.d]="p" />
              </ng-container>
              <path *ngIf="!isArray(item.svgPath)"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    [attr.d]="item.svgPath" />
            </svg>

            <!-- Label -->
            <span *ngIf="!collapsed"
                  class="text-sm font-medium flex-1 relative
                         z-10 truncate animate-fade-in">
              {{ item.label }}
            </span>

            <!-- Badge -->
            <span *ngIf="item.badge && !collapsed"
                  class="relative z-10 text-[10px] font-bold
                         bg-blue-600 text-white rounded-full
                         w-5 h-5 flex items-center justify-center
                         flex-shrink-0">
              {{ item.badge }}
            </span>

            <!-- Tooltip (collapsed) -->
            <div *ngIf="collapsed"
                 class="pointer-events-none absolute left-full
                        ml-3 z-50 px-2.5 py-1.5
                        bg-slate-800 border border-slate-700
                        text-white text-xs font-medium
                        rounded-lg shadow-xl whitespace-nowrap
                        opacity-0 -translate-x-2
                        group-hover:opacity-100
                        group-hover:translate-x-0
                        transition-all duration-150">
              {{ item.label }}
              <span class="absolute right-full top-1/2 -translate-y-1/2
                           border-[5px] border-transparent
                           border-r-slate-800">
              </span>
            </div>

          </a>

        </li>
      </ul>
    </div>

  </nav>

  <!-- ═══════════════════════════════════════════════
       USER CARD
  ═══════════════════════════════════════════════ -->
  <div class="flex-shrink-0 p-3
              border-t border-white/[0.06]">

    <div *ngIf="!collapsed"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg hover:bg-white/[0.06]
                cursor-pointer transition-all duration-150 group">
      <div class="w-7 h-7 rounded-full bg-blue-600
                  flex items-center justify-center
                  text-white text-xs font-bold flex-shrink-0">
        A
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-white
                  leading-tight truncate">
          Administrator
        </p>
        <p class="text-[11px] text-slate-500 leading-tight truncate">
          adminexplorer.tn
        </p>
      </div>
      <svg class="w-4 h-4 text-slate-600
                  group-hover:text-slate-400
                  transition-colors duration-150 flex-shrink-0"
           fill="none" stroke="currentColor"
           viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M8 9l4-4 4 4m0 6l-4 4-4-4" />
      </svg>
    </div>

    <!-- Collapsed avatar -->
    <div *ngIf="collapsed"
         class="flex justify-center">
      <div class="w-8 h-8 rounded-full bg-blue-600
                  flex items-center justify-center
                  text-white text-xs font-bold cursor-pointer">
        A
      </div>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════
       COLLAPSE BUTTON
  ═══════════════════════════════════════════════ -->
  <button
    (click)="toggleCollapse.emit()"
    class="absolute -right-3 top-[72px]
           w-6 h-6 rounded-full
           bg-[#1a2640] border border-white/[0.12]
           flex items-center justify-center
           text-slate-400 hover:text-white
           hover:bg-blue-600 hover:border-blue-600
           transition-all duration-200 shadow-lg z-40">
    <svg class="w-3 h-3 transition-transform duration-300"
         [class.rotate-180]="collapsed"
         fill="none" stroke="currentColor"
         viewBox="0 0 24 24" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 19l-7-7 7-7" />
    </svg>
  </button>

</aside>

<!-- ── Sidebar active states ──────────────────────────── -->
<style>
  .nav-item.is-active {
    color: white;
  }
  .nav-item.is-active .nav-active-bg  { opacity: 1; }
  .nav-item.is-active .nav-active-line { opacity: 1; }
</style>
