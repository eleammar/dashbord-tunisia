<div class="flex items-center justify-between mb-4">
  <h2 class="text-2xl font-bold">Categories</h2>
  <button class="px-4 py-2 rounded bg-green-600 text-white hover:bg-green-700 text-sm font-medium shadow" (click)="addCategory()">
    + Add Category
  </button>
</div>
<div *ngIf="loading()" class="text-slate-400">Chargement...</div>
<div *ngIf="error()" class="text-red-500">{{error()}}</div>
<div *ngIf="!loading() && !error() && categories().length === 0" class="text-slate-400">Aucune catégorie trouvée.</div>

<div *ngIf="categories().length > 0" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
  <div *ngFor="let category of categories()" class="bg-white rounded-xl shadow p-4 flex flex-col">
    <div class="flex-1">
      <h3 class="font-semibold text-lg mb-1 flex items-center gap-2">
        <span *ngIf="category.icon" [innerHTML]="category.icon"></span>
        {{category.label}}
      </h3>
      <div class="text-xs text-slate-500 mb-2">{{category.value}}</div>
    </div>
    <div class="flex gap-2 mt-2">
      <button class="px-3 py-1 rounded bg-blue-100 text-blue-700 hover:bg-blue-200 text-xs font-medium" (click)="editCategory(category)">Edit</button>
      <button class="px-3 py-1 rounded bg-red-100 text-red-700 hover:bg-red-200 text-xs font-medium" (click)="deleteCategory(category)">Delete</button>
    </div>
  </div>
</div>
