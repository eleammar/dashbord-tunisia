<div class="flex items-center justify-between mb-4">
  <h2 class="text-2xl font-bold">{{ isEdit ? 'Edit Region' : 'Add Region' }}</h2>
  <button type="button" class="px-4 py-2 rounded bg-slate-200 text-slate-700 hover:bg-slate-300 text-sm font-medium shadow" (click)="router.navigate(['/food'])">
    Retour
  </button>
</div>
<div *ngIf="loading" class="text-slate-400">Chargement...</div>
<div *ngIf="error" class="text-red-500">{{error}}</div>
<form *ngIf="!loading" [formGroup]="form" (ngSubmit)="submit()" class="space-y-8 max-w-xl mx-auto bg-white shadow-xl rounded-2xl p-8 animate-fade-in">
  <div>
    <label class="block font-semibold text-slate-700 mb-2">Nom de la région</label>
    <input formControlName="name" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Nom" />
    <div *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="text-red-500 text-xs mt-1 animate-pulse">Nom requis</div>
  </div>
  <div>
    <label class="block font-semibold text-slate-700 mb-2">Spécialité</label>
    <input formControlName="specialty" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Spécialité" />
    <div *ngIf="form.get('specialty')?.invalid && form.get('specialty')?.touched" class="text-red-500 text-xs mt-1 animate-pulse">Spécialité requise</div>
  </div>
  <div>
    <label class="block font-semibold text-slate-700 mb-2">Description</label>
    <textarea formControlName="description" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Description" rows="2"></textarea>
    <div *ngIf="form.get('description')?.invalid && form.get('description')?.touched" class="text-red-500 text-xs mt-1 animate-pulse">Description requise</div>
  </div>
  <div>
    <label class="block font-semibold text-slate-700 mb-2">Images (URLs, séparées par des virgules)</label>
    <input formControlName="images" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all mb-2" placeholder="http://..." />
    <input type="file" multiple (change)="onFilesSelected($event)" class="w-full border border-blue-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all" />
    <div *ngIf="selectedFiles && selectedFiles.length" class="mt-2 flex flex-wrap gap-2">
      <span *ngFor="let file of selectedFiles">{{file.name}}</span>
    </div>
    <div *ngIf="loading" class="text-blue-500 text-xs mt-1 animate-pulse">Upload en cours...</div>
    <div *ngIf="uploadError" class="text-red-500 text-xs mt-1 animate-pulse">{{uploadError}}</div>
  </div>
  <button type="submit" [disabled]="loading || form.invalid" class="w-full py-3 rounded-lg bg-gradient-to-r from-blue-600 to-blue-500 text-white hover:from-blue-700 hover:to-blue-600 font-bold text-lg shadow-lg transition-all flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
    <svg *ngIf="loading" class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
    {{ loading ? (isEdit ? 'Modification...' : 'Enregistrement...') : (isEdit ? 'Modifier' : 'Enregistrer') }}
  </button>
</form>
