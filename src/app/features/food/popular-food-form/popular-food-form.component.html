<div class="flex items-center justify-between mb-4">
  <h2 class="text-2xl font-bold">{{ isEdit ? 'Edit Popular Food' : 'Add Popular Food' }}</h2>
  <button type="button" class="px-4 py-2 rounded bg-slate-200 text-slate-700 hover:bg-slate-300 text-sm font-medium shadow" (click)="router.navigate(['/food/popular'])">
    Retour
  </button>
</div>
<div *ngIf="loading" class="text-slate-400">Chargement...</div>
<div *ngIf="error" class="text-red-500">{{error}}</div>
<form *ngIf="!loading" [formGroup]="form" (ngSubmit)="submit()" class="space-y-8 max-w-xl mx-auto bg-white shadow-xl rounded-2xl p-8 animate-fade-in">
  <div>
    <label class="block font-semibold text-slate-700 mb-2">🍽️ Nom du plat</label>
    <input formControlName="name" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Nom" />
    <div *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="text-red-500 text-xs mt-1 animate-pulse">Nom requis</div>
  </div>
  <div>
    <label class="block font-semibold text-slate-700 mb-2">📝 Description</label>
    <textarea formControlName="description" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Description" rows="2"></textarea>
    <div *ngIf="form.get('description')?.invalid && form.get('description')?.touched" class="text-red-500 text-xs mt-1 animate-pulse">Description requise</div>
  </div>
  <div>
    <label class="block font-semibold text-slate-700 mb-2">🏷️ Catégorie</label>
    <input formControlName="category" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Catégorie" />
    <div *ngIf="form.get('category')?.invalid && form.get('category')?.touched" class="text-red-500 text-xs mt-1 animate-pulse">Catégorie requise</div>
  </div>
  <div>
    <label class="block font-semibold text-slate-700 mb-2">🏙️ Ville</label>
    <input formControlName="city" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Ville" />
    <div *ngIf="form.get('city')?.invalid && form.get('city')?.touched" class="text-red-500 text-xs mt-1 animate-pulse">Ville requise</div>
  </div>
  <div>
    <label class="block font-semibold text-slate-700 mb-2">🥕 Ingrédients</label>
    <div *ngFor="let ing of ingredients; let i = index" class="flex gap-2 mb-2 group transition-all">
      <input [formControl]="ing" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-400 transition-all" placeholder="Ingrédient" />
      <button type="button" (click)="removeIngredient(i)" class="text-red-500 opacity-0 group-hover:opacity-100 transition-opacity duration-200" title="Supprimer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <button type="button" (click)="addIngredient()" class="px-3 py-1 bg-green-100 rounded-lg text-green-700 hover:bg-green-200 transition-all font-medium">
      <svg class="w-4 h-4 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Ajouter ingrédient
    </button>
  </div>
  <div>
    <label class="block font-semibold text-slate-700 mb-2">👨‍🍳 Étapes de préparation</label>
    <div *ngFor="let step of steps; let i = index" class="flex gap-2 mb-2 group transition-all">
      <input [formControl]="step" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-400 transition-all" placeholder="Étape" />
      <button type="button" (click)="removeStep(i)" class="text-red-500 opacity-0 group-hover:opacity-100 transition-opacity duration-200" title="Supprimer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <button type="button" (click)="addStep()" class="px-3 py-1 bg-green-100 rounded-lg text-green-700 hover:bg-green-200 transition-all font-medium">
      <svg class="w-4 h-4 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Ajouter étape
    </button>
  </div>
  <div>
    <label class="block font-semibold text-slate-700 mb-2">🖼️ Image</label>
    <div class="flex flex-col sm:flex-row gap-4 items-center">
      <div class="flex-1">
        <input type="file" accept="image/*" (change)="onFileChange($event)" class="mb-2 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all" />
        <div class="text-xs text-slate-500 mb-2">Ou collez un lien d'image :</div>
        <input formControlName="imageUrl" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all" placeholder="URL de l'image" />
        <div *ngIf="form.get('imageUrl')?.invalid && form.get('imageUrl')?.touched && !imageFile" class="text-red-500 text-xs mt-1 animate-pulse">Image requise</div>
        <div *ngIf="imageFile" class="text-green-600 text-xs mt-1 animate-fade-in">Fichier sélectionné : {{ imageFile.name }}</div>
      </div>
      <div *ngIf="form.get('imageUrl')?.value || imageFile" class="flex flex-col items-center">
        <img [src]="imageFile ? (imageFile | fileUrl) : form.get('imageUrl')?.value" alt="Aperçu" class="w-32 h-32 object-cover rounded-lg border border-slate-200 shadow-md animate-fade-in" />
        <span class="text-xs text-slate-400 mt-1">Aperçu</span>
      </div>
    </div>
  </div>
  <button type="submit" [disabled]="loading || form.invalid" class="w-full py-3 rounded-lg bg-gradient-to-r from-blue-600 to-blue-500 text-white hover:from-blue-700 hover:to-blue-600 font-bold text-lg shadow-lg transition-all flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
    <svg *ngIf="loading" class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
    {{ loading ? (isEdit ? 'Modification...' : 'Enregistrement...') : (isEdit ? 'Modifier' : 'Enregistrer') }}
  </button>
</form>
