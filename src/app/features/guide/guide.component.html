<div class="min-h-screen bg-slate-50">

  <!-- ══════════════════════════════════════════════════════
       TOP BAR
  ══════════════════════════════════════════════════════ -->
  <div class="sticky top-0 z-30 bg-white border-b border-slate-200 shadow-sm">
    <div class="flex items-center gap-3 px-6 h-14">

      <!-- Brand -->
      <div class="flex items-center gap-2.5 flex-shrink-0">
        <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-sm">
          <span class="text-sm">🗺️</span>
        </div>
        <div class="hidden sm:block">
          <p class="text-[13px] font-bold text-slate-900 leading-none">Guide Editor</p>
          <p class="text-[10px] text-slate-400 leading-none mt-0.5">City content management</p>
        </div>
      </div>

      <div class="w-px h-6 bg-slate-200 flex-shrink-0 mx-1"></div>

      <!-- City Selector -->
      <div class="relative flex-shrink-0">
        <button (click)="showCityDropdown.set(!showCityDropdown())"
                class="flex items-center gap-2 pl-3 pr-2 py-2
                       bg-slate-100 hover:bg-slate-200 rounded-lg border border-slate-200
                       text-sm font-medium text-slate-700 min-w-[170px] transition-all duration-150">
          <svg class="w-3.5 h-3.5 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
          </svg>
          <span class="flex-1 truncate text-left">{{ selectedCity()?.name || 'Choisir une ville' }}</span>
          <svg class="w-3.5 h-3.5 text-slate-400 flex-shrink-0 transition-transform duration-150"
               [class.rotate-180]="showCityDropdown()"
               fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        <!-- Dropdown -->
        <div *ngIf="showCityDropdown()"
             class="absolute top-full left-0 mt-1.5 w-60 bg-white border border-slate-200
                    rounded-xl shadow-2xl z-50 py-1.5 overflow-y-auto max-h-72">
          <p class="px-3 py-1.5 text-[10px] font-semibold uppercase tracking-widest text-slate-400">
            Villes disponibles
          </p>
          <div *ngIf="cities().length === 0"
               class="px-3 py-4 text-sm text-slate-400 text-center">
            Aucune ville
          </div>
          <button *ngFor="let city of cities()"
                  (click)="selectCity(city)"
                  class="w-full flex items-center gap-2.5 px-3 py-2
                         text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-700
                         transition-colors duration-100">
            <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                  [class.bg-blue-500]="city.id === selectedCityId()"
                  [class.bg-slate-300]="city.id !== selectedCityId()">
            </span>
            <span class="font-medium flex-1 text-left">{{ city.name }}</span>
            <span class="text-[11px] text-slate-400">{{ city.region }}</span>
          </button>
        </div>
      </div>

      <!-- Content score -->
      <div *ngIf="selectedCity()"
           class="hidden sm:flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5">
        <div class="w-20 h-1.5 bg-slate-200 rounded-full overflow-hidden">
          <div class="h-full rounded-full transition-all duration-700"
               [style.width]="contentScore() + '%'"
               [class]="scoreBg()">
          </div>
        </div>
        <span class="text-xs font-bold tabular-nums" [class]="scoreColor()">{{ contentScore() }}%</span>
        <span class="text-[11px] text-slate-400">qualité</span>
      </div>

      <div class="flex-1"></div>

      <!-- Actions -->
      <div *ngIf="selectedCity()" class="flex items-center gap-2">
        <button class="hidden md:flex items-center gap-1.5 px-3 py-1.5 text-sm text-slate-600
                       hover:text-slate-900 hover:bg-slate-100 rounded-lg border border-transparent
                       hover:border-slate-200 transition-colors duration-150">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
          Aperçu
        </button>
        <button class="flex items-center gap-1.5 px-4 py-1.5 bg-blue-600 hover:bg-blue-700
                       text-white text-sm font-medium rounded-lg transition-all shadow-sm hover:shadow-md">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
          Publier
        </button>
      </div>
    </div>

    <!-- Tab Nav -->
    <div *ngIf="selectedCity() && !loading()"
         class="flex border-t border-slate-100 px-4 overflow-x-auto"
         style="scrollbar-width:none">
      <button *ngFor="let tab of tabs"
              (click)="setTab(tab.key)"
              class="flex items-center gap-1.5 px-4 py-2.5 text-[13px] font-medium
                     border-b-2 transition-all duration-150 whitespace-nowrap flex-shrink-0"
              [class.border-blue-600]="activeTab() === tab.key"
              [class.text-blue-600]="activeTab() === tab.key"
              [class.border-transparent]="activeTab() !== tab.key"
              [class.text-slate-500]="activeTab() !== tab.key">
        <span class="text-[15px]">{{ tab.icon }}</span>
        <span>{{ tab.label }}</span>
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       EMPTY STATE
  ══════════════════════════════════════════════════════ -->
  <div *ngIf="!selectedCity()"
       class="flex items-center justify-center"
       style="min-height: calc(100vh - 56px)">
    <div class="text-center max-w-xs px-6">
      <div class="w-24 h-24 bg-gradient-to-br from-blue-50 to-indigo-100 rounded-2xl
                  flex items-center justify-center mx-auto mb-5 shadow-inner">
        <span class="text-5xl">🗺️</span>
      </div>
      <h2 class="text-xl font-bold text-slate-800 mb-2">Guide Editor</h2>
      <p class="text-slate-500 text-sm leading-relaxed">
        Sélectionnez une ville pour commencer à éditer son guide touristique.
      </p>
      <button (click)="showCityDropdown.set(true)"
              class="mt-5 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white
                     text-sm font-medium rounded-lg transition-colors shadow-sm">
        Choisir une ville
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       LOADING
  ══════════════════════════════════════════════════════ -->
  <div *ngIf="selectedCity() && loading()"
       class="flex items-center justify-center"
       style="min-height: calc(100vh - 112px)">
    <div class="flex flex-col items-center gap-3">
      <div class="w-10 h-10 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-sm text-slate-500">Chargement du guide...</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       WORKSPACE
  ══════════════════════════════════════════════════════ -->
  <div *ngIf="selectedCity() && !loading()" class="p-6 max-w-6xl mx-auto">

    <app-guide-hero-editor
      *ngIf="activeTab() === 'hero'"
      [cityId]="numericCityId"
      (guideChanged)="onGuideReload()">
    </app-guide-hero-editor>

    <app-guide-hero-categories-editor
      *ngIf="activeTab() === 'hero-categories'"
      [cityId]="numericCityId"
      (guideChanged)="onGuideReload()">
    </app-guide-hero-categories-editor>

    <app-guide-categories-editor
      *ngIf="activeTab() === 'categories'"
      [cityId]="numericCityId">
    </app-guide-categories-editor>

    <app-guide-places-editor
      *ngIf="activeTab() === 'places'"
      [cityId]="numericCityId"
      (guideChanged)="onGuideReload()">
    </app-guide-places-editor>

    <app-guide-circuits-editor
      *ngIf="activeTab() === 'circuits'"
      [cityId]="numericCityId"
      (guideChanged)="onGuideReload()">
    </app-guide-circuits-editor>

    <app-guide-live-guides-editor
      *ngIf="activeTab() === 'live-guides'"
      [cityId]="numericCityId"
      (guideChanged)="onGuideReload()">
    </app-guide-live-guides-editor>

  </div>
</div>
