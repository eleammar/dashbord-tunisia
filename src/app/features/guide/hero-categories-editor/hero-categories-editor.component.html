<div *ngIf="loading()" class="flex items-center justify-center py-24">
  <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
</div>

<div *ngIf="!loading()">
  <!-- Header -->
  <div class="flex items-center justify-between mb-5">
    <div>
      <h2 class="text-lg font-bold text-slate-800">🏷️ Hero Catégories</h2>
      <p class="text-xs text-slate-400 mt-0.5">{{ categories().length }} catégorie(s) configurée(s)</p>
    </div>
    <button (click)="openAdd()"
            class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700
                   text-white text-sm font-medium rounded-lg transition-all shadow-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      Ajouter
    </button>
  </div>

  <!-- Empty state -->
  <div *ngIf="categories().length === 0"
       class="flex flex-col items-center justify-center py-16 bg-white rounded-xl border border-dashed border-slate-300">
    <span class="text-4xl mb-3">🏷️</span>
    <p class="text-sm font-medium text-slate-500">Aucune catégorie hero</p>
    <p class="text-xs text-slate-400 mt-1">Ajoutez des catégories pour enrichir le hero de la page guide.</p>
    <button (click)="openAdd()"
            class="mt-4 px-4 py-2 text-sm text-blue-600 border border-blue-200 rounded-lg hover:bg-blue-50 transition-colors">
      Créer la première
    </button>
  </div>

  <!-- Grid -->
  <div *ngIf="categories().length > 0"
       class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
    <div *ngFor="let cat of categories()"
         class="group bg-white border border-slate-200 rounded-xl overflow-hidden
                shadow-sm hover:shadow-md hover:border-blue-200 transition-all duration-200">

      <!-- Image -->
      <div class="relative h-28 bg-slate-100 overflow-hidden">
        <img *ngIf="cat.image" [src]="cat.image"
             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
             onerror="this.style.display='none'"/>
        <div *ngIf="!cat.image" class="w-full h-full flex items-center justify-center text-slate-300">
          <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </div>
        <!-- Action overlay -->
        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100
                    transition-opacity duration-200 flex items-center justify-center gap-2">
          <button (click)="openEdit(cat)"
                  class="w-8 h-8 bg-white rounded-lg flex items-center justify-center
                         text-slate-700 hover:bg-blue-600 hover:text-white transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
          <button (click)="delete(cat)"
                  class="w-8 h-8 bg-white rounded-lg flex items-center justify-center
                         text-slate-700 hover:bg-red-500 hover:text-white transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Info -->
      <div class="px-3 py-2.5">
        <p class="text-xs font-semibold text-slate-800 truncate">{{ cat.label }}</p>
        <p class="text-[10px] text-slate-400 mt-0.5 truncate">{{ cat.key }}</p>
      </div>
    </div>
  </div>
</div>

<!-- ── MODAL ───────────────────────────────────────────────── -->
<div *ngIf="showModal()"
     class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" (click)="showModal.set(false)"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 space-y-4">

    <div class="flex items-center justify-between">
      <h3 class="text-base font-bold text-slate-800">
        {{ isEditing() ? 'Modifier la catégorie' : 'Nouvelle catégorie hero' }}
      </h3>
      <button (click)="showModal.set(false)" class="text-slate-400 hover:text-slate-600 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="space-y-3">
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Clé *</label>
        <input type="text" [value]="editItem()?.key || ''"
               (input)="setField('key', $any($event.target).value)"
               placeholder="Ex: beaches"
               class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-lg
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Label *</label>
        <input type="text" [value]="editItem()?.label || ''"
               (input)="setField('label', $any($event.target).value)"
               placeholder="Ex: Plages"
               class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-lg
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Image (URL)</label>
        <input type="text" [value]="editItem()?.image || ''"
               (input)="setField('image', $any($event.target).value)"
               placeholder="https://..."
               class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-lg
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
        <div *ngIf="editItem()?.image" class="mt-2 h-20 rounded-lg overflow-hidden border border-slate-200">
          <img [src]="editItem()?.image" class="w-full h-full object-cover" onerror="this.style.display='none'"/>
        </div>
      </div>
    </div>

    <div class="flex gap-3 pt-2">
      <button (click)="showModal.set(false)"
              class="flex-1 py-2.5 text-sm text-slate-600 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">
        Annuler
      </button>
      <button (click)="save()" [disabled]="saving()"
              class="flex-1 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700
                     disabled:opacity-60 rounded-lg transition-colors">
        {{ saving() ? 'Sauvegarde...' : isEditing() ? 'Mettre à jour' : 'Créer' }}
      </button>
    </div>
  </div>
</div>
