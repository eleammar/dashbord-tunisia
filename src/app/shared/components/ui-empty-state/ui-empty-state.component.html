<div class="flex flex-col items-center justify-center text-center w-full"
     [class]="sizeClasses[size]">

  <!-- Emoji illustration -->
  <div class="relative mb-6">
    <div class="w-20 h-20 rounded-full
                bg-gradient-to-br from-surface-muted to-surface-overlay
                dark:from-surface-dark-muted dark:to-surface-dark-overlay
                flex items-center justify-center shadow-inner-subtle">
      <span [class]="emojiSize">{{ emoji }}</span>
    </div>
    <!-- Decorative dots -->
    <div class="absolute -top-1 -right-1 w-4 h-4 rounded-full
                bg-primary-100 dark:bg-primary-900 opacity-60"></div>
    <div class="absolute -bottom-2 -left-2 w-3 h-3 rounded-full
                bg-gold-100 dark:bg-gold-900 opacity-60"></div>
  </div>

  <!-- Text -->
  <h3 class="font-display font-semibold text-content-primary mb-2"
      [class]="size === 'lg' ? 'text-2xl' : 'text-xl'">
    {{ title }}
  </h3>
  <p class="text-content-secondary max-w-sm mx-auto leading-relaxed"
     [class]="size === 'sm' ? 'text-xs' : 'text-sm'">
    {{ description }}
  </p>

  <!-- Actions -->
  <div *ngIf="actionLabel || secondaryLabel"
       class="flex items-center gap-3 mt-6 flex-wrap justify-center">
    <button *ngIf="actionLabel"
            (click)="action.emit()"
            class="btn-primary">
      {{ actionLabel }}
    </button>
    <button *ngIf="secondaryLabel"
            (click)="secondaryAction.emit()"
            class="btn-ghost border border-[var(--border)]">
      {{ secondaryLabel }}
    </button>
  </div>

</div>
