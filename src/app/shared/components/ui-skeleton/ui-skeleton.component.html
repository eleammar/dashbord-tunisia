<ng-container *ngFor="let _ of items">

  <!-- ── CARD ───────────────────────────────────────── -->
  <div *ngIf="variant === 'card'"
       class="card p-5 space-y-4">
    <!-- Image area -->
    <div class="skeleton -mx-5 -mt-5 h-36 rounded-t-card"></div>
    <!-- Title -->
    <div class="skeleton h-5 w-3/4 rounded-tag mt-4"></div>
    <!-- Subtitle -->
    <div class="skeleton h-3.5 w-1/3 rounded-tag"></div>
    <!-- Text lines -->
    <div class="space-y-2">
      <div class="skeleton h-3 w-full rounded-tag"></div>
      <div class="skeleton h-3 w-5/6 rounded-tag"></div>
    </div>
    <!-- Badges -->
    <div class="flex gap-2">
      <div class="skeleton h-5 w-14 rounded-pill"></div>
      <div class="skeleton h-5 w-12 rounded-pill"></div>
      <div class="skeleton h-5 w-16 rounded-pill"></div>
    </div>
    <!-- Footer -->
    <div class="flex items-center justify-between pt-3 border-t border-[var(--border)]">
      <div class="skeleton h-4 w-28 rounded-tag"></div>
      <div class="skeleton h-4 w-12 rounded-tag"></div>
    </div>
  </div>

  <!-- ── TABLE ROW ──────────────────────────────────── -->
  <div *ngIf="variant === 'table-row'"
       class="flex items-center gap-4 px-4 py-3
              border-b border-[var(--border)]">
    <div class="skeleton w-9 h-9 rounded-lg flex-shrink-0"></div>
    <div class="flex-1 space-y-1.5">
      <div class="skeleton h-4 w-2/5 rounded-tag"></div>
      <div class="skeleton h-3 w-1/4 rounded-tag"></div>
    </div>
    <div class="skeleton h-5 w-16 rounded-pill"></div>
    <div class="skeleton h-5 w-20 rounded-pill"></div>
    <div class="skeleton h-8 w-8 rounded-lg flex-shrink-0"></div>
  </div>

  <!-- ── LIST ITEM ──────────────────────────────────── -->
  <div *ngIf="variant === 'list-item'"
       class="flex items-center gap-3 py-3
              border-b border-[var(--border)]">
    <div class="skeleton w-7 h-7 rounded-full flex-shrink-0"></div>
    <div class="flex-1">
      <div class="skeleton h-4 w-3/5 rounded-tag"></div>
    </div>
    <div class="skeleton h-4 w-10 rounded-tag"></div>
  </div>

  <!-- ── TEXT ───────────────────────────────────────── -->
  <div *ngIf="variant === 'text'" class="space-y-2">
    <div class="skeleton h-4 w-full rounded-tag"></div>
    <div class="skeleton h-4 w-5/6 rounded-tag"></div>
    <div class="skeleton h-4 w-4/6 rounded-tag"></div>
  </div>

  <!-- ── AVATAR ─────────────────────────────────────── -->
  <div *ngIf="variant === 'avatar'"
       class="skeleton w-10 h-10 rounded-full"></div>

  <!-- ── BADGE ──────────────────────────────────────── -->
  <div *ngIf="variant === 'badge'"
       class="skeleton h-5 w-16 rounded-pill inline-block"></div>

  <!-- ── CUSTOM ─────────────────────────────────────── -->
  <div *ngIf="variant === 'custom'"
       class="skeleton rounded-card"
       [style.height]="height ?? '2rem'"
       [style.width]="width ?? '100%'">
  </div>

</ng-container>
